<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BILLION — INVERNORD (Auto Reports)</title>
  <style>
    body{ margin:0; font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial; background:#0b0f19; color:#fff; }
    .wrap{ max-width:900px; margin:0 auto; padding:28px 18px; }
    .card{ background:#111827; border:1px solid rgba(255,255,255,.10); border-radius:16px; padding:18px; }
    label{ display:block; font-size:12px; color:rgba(255,255,255,.65); margin:10px 0 6px; }
    input{ width:100%; padding:10px 12px; border-radius:12px; border:1px solid rgba(255,255,255,.12); background:rgba(0,0,0,.20); color:#fff; }
    .row{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    @media(max-width:700px){ .row{ grid-template-columns:1fr; } }
    .btn{ margin-top:14px; width:100%; padding:12px 12px; border-radius:14px; border:1px solid rgba(255,255,255,.14);
      background:linear-gradient(135deg, rgba(124,58,237,.95), rgba(6,182,212,.75)); color:#fff; font-weight:700; cursor:pointer; }
    .small{ font-size:12px; color:rgba(255,255,255,.55); margin-top:10px; line-height:1.35; }
    .ok{ color:#7CFFB2; }
    .err{ color:#FF8A8A; }
  </style>
</head>
<body>
  <div class="wrap">
    <h2 style="margin:0 0 12px;">BILLION · INVERNORD</h2>
    <div class="card">
      <div class="row">
        <div>
          <label>Firma</label>
          <input id="firm" value="INVERNORD" />
        </div>
        <div>
          <label>Fecha</label>
          <input id="date" placeholder="Febrero 2026" />
        </div>
      </div>

      <div class="row">
        <div>
          <label>Cliente (opcional)</label>
          <input id="client" placeholder="Cliente / Cuenta" />
        </div>
        <div>
          <label>Ticker (opcional: si lo dejas vacío, lo intenta detectar)</label>
          <input id="ticker" placeholder="PLTR" />
        </div>
      </div>

      <label>PDF (LSEG o fuente)</label>
      <input id="file" type="file" accept="application/pdf" />

      <button class="btn" id="go">Subir PDF y generar reporte (PDF)</button>

      <div class="small" id="status">Status: listo.</div>
      <div class="small">MVP: extracción + heurísticas. Próximo: parsing fino por plantilla LSEG.</div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    function setStatus(msg, cls=""){
      const el = $("status");
      el.className = "small " + cls;
      el.textContent = "Status: " + msg;
    }

    $("date").value = new Date().toLocaleDateString("es-MX");

    $("go").addEventListener("click", async () => {
      const f = $("file").files?.[0];
      if(!f){ setStatus("sube un PDF primero.", "err"); return; }

      setStatus("subiendo y generando…", "");

      const fd = new FormData();
      fd.append("file", f);
      fd.append("firm", $("firm").value || "INVERNORD");
      fd.append("date", $("date").value || "");
      fd.append("client", $("client").value || "");
      fd.append("ticker", $("ticker").value || "");

      try{
        const res = await fetch("/api/generate-report", { method:"POST", body: fd });
        if(!res.ok){
          const j = await res.json().catch(()=>({}));
          throw new Error(j.error || ("HTTP " + res.status));
        }
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = "INVERNORD_report.pdf";
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);

        setStatus("PDF generado ✅", "ok");
      }catch(e){
        setStatus("error: " + e.message, "err");
      }
    });
  </script>
</body>
</html>
