<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BILLION • INVERNORD — Report Generator</title>
  <style>
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:#070a12;color:#eaf0ff}
    .wrap{max-width:980px;margin:0 auto;padding:48px 20px}
    .card{background:linear-gradient(180deg,#0b1224 0%,#070a12 100%);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:22px}
    h1{margin:0 0 6px 0;font-size:28px;letter-spacing:.2px}
    .sub{margin:0 0 20px 0;color:#a9b4d0}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    label{display:block;font-size:12px;color:#9fb0da;margin:10px 0 6px}
    input,select{width:100%;box-sizing:border-box;background:#0b1328;border:1px solid rgba(255,255,255,.1);color:#eaf0ff;border-radius:12px;padding:12px}
    .row{display:flex;gap:12px;align-items:center;margin-top:14px}
    .btn{
      flex:1;
      border:0;border-radius:14px;padding:14px 16px;
      color:white;font-weight:700;cursor:pointer;
      background:linear-gradient(90deg,#7c3aed,#06b6d4);
    }
    .btn:disabled{opacity:.6;cursor:not-allowed}
    .muted{color:#8fa0c7;font-size:12px;margin-top:10px}
    .status{margin-top:10px;font-size:13px;color:#bcd0ff}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
    @media(max-width:800px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>BILLION • INVERNORD</h1>
      <p class="sub">Sube un PDF (LSEG) y genera el reporte maestro en PDF (cliente-ready).</p>

      <div class="grid">
        <div>
          <label>Firma</label>
          <input id="firm" value="INVERNORD" />
        </div>
        <div>
          <label>Fecha</label>
          <input id="date" type="date" />
        </div>
        <div>
          <label>Cliente (opcional)</label>
          <input id="client" placeholder="Cliente / Cuenta" />
        </div>
        <div>
          <label>Ticker (opcional; si lo dejas vacío, lo intenta detectar)</label>
          <input id="ticker" value="PLTR" />
        </div>
      </div>

      <label>PDF (LSEG o fuente)</label>
      <input id="pdf" type="file" accept="application/pdf"/>

      <div class="row">
        <button id="btn" class="btn">Subir PDF y generar reporte (PDF)</button>
      </div>

      <div class="status" id="status">Status: listo.</div>
      <div class="muted">
        Tip: nómbralo así: <span class="mono">TICKER - 02 2026.pdf</span>. Si el PDF es escaneado (imagen), en fase 2 metemos OCR.
      </div>
    </div>
  </div>

<script>
  // default date = today
  const d = new Date();
  const pad = n => String(n).padStart(2,'0');
  document.getElementById('date').value = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;

  const btn = document.getElementById('btn');
  const statusEl = document.getElementById('status');

  btn.addEventListener('click', async () => {
    const pdf = document.getElementById('pdf').files[0];
    if (!pdf) { alert('Sube un PDF primero.'); return; }

    btn.disabled = true;
    statusEl.textContent = 'Status: subiendo y procesando…';

    const fd = new FormData();
    fd.append('pdf', pdf);
    fd.append('firm', document.getElementById('firm').value || 'INVERNORD');
    fd.append('date', document.getElementById('date').value);
    fd.append('client', document.getElementById('client').value || '');
    fd.append('ticker', document.getElementById('ticker').value || '');

    try {
      const res = await fetch('/api/generate-report', { method: 'POST', body: fd });
      if (!res.ok) {
        const txt = await res.text();
        throw new Error(txt || `HTTP ${res.status}`);
      }
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);

      const a = document.createElement('a');
      const ticker = (document.getElementById('ticker').value || 'REPORTE').toUpperCase();
      a.href = url;
      a.download = `${ticker} - Reporte Maestro - ${document.getElementById('date').value}.pdf`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);

      statusEl.textContent = 'Status: PDF generado y descargado.';
    } catch (e) {
      console.error(e);
      statusEl.textContent = 'Status: error. Revisa consola / logs de Vercel.';
      alert('Error generando el PDF. Abre Vercel → Logs para ver el detalle.\n\n' + e.message);
    } finally {
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
