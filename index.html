<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BILLION · INVERNORD</title>
  <style>
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial;background:#0b0f19;color:#fff}
    .wrap{max-width:980px;margin:0 auto;padding:36px}
    .card{background:#0f172a;border:1px solid rgba(255,255,255,.06);border-radius:18px;padding:22px;box-shadow:0 20px 60px rgba(0,0,0,.35)}
    .title{font-size:28px;font-weight:800;letter-spacing:.5px}
    .sub{color:#93a4b8;margin-top:6px;margin-bottom:18px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    label{display:block;color:#93a4b8;font-size:13px;margin-bottom:6px}
    input{width:100%;padding:12px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:#0b1224;color:#fff}
    input[type="file"]{padding:10px}
    .row{margin-top:12px}
    .btn{margin-top:16px;width:100%;padding:14px 16px;border-radius:14px;border:0;color:#fff;font-weight:800;
      background:linear-gradient(90deg,#7c3aed,#06b6d4);cursor:pointer}
    .btn:disabled{opacity:.55;cursor:not-allowed}
    .hint{margin-top:10px;color:#93a4b8;font-size:12px}
    .status{margin-top:10px;font-size:13px;color:#cbd5e1}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="title">BILLION · INVERNORD</div>
      <div class="sub">Sube un PDF (LSEG) y genera un reporte en PDF.</div>

      <div class="grid">
        <div class="row">
          <label>Firma</label>
          <input id="firm" value="INVERNORD" />
        </div>
        <div class="row">
          <label>Fecha</label>
          <input id="date" />
        </div>
        <div class="row">
          <label>Cliente (opcional)</label>
          <input id="client" placeholder="Ej. Marcelo / Ross / Margolis" />
        </div>
        <div class="row">
          <label>Ticker (opcional)</label>
          <input id="ticker" value="PLTR" />
        </div>
      </div>

      <div class="row">
        <label>PDF (LSEG o fuente)</label>
        <input id="pdf" type="file" accept="application/pdf" />
      </div>

      <button id="btn" class="btn">Subir PDF y generar reporte (PDF)</button>

      <div id="status" class="status">Status: listo.</div>
      <div class="hint">
        Tip: nómbralo así: <span class="mono">TICKER - 02 2026.pdf</span>.
      </div>
    </div>
  </div>

<script>
  const $ = (id) => document.getElementById(id);

  function isoToday() {
    const d = new Date();
    const mm = String(d.getMonth()+1).padStart(2,'0');
    const dd = String(d.getDate()).padStart(2,'0');
    return `${d.getFullYear()}-${mm}-${dd}`;
  }
  $('date').value = isoToday();

  $('btn').onclick = async () => {
    const pdf = $('pdf').files[0];
    if (!pdf) return alert("Sube un PDF primero.");

    $('btn').disabled = true;
    $('status').textContent = "Status: subiendo y procesando...";

    const fd = new FormData();
    fd.append('pdf', pdf); // <-- IMPORTANTE: field name 'pdf'
    fd.append('firm', $('firm').value || 'INVERNORD');
    fd.append('date', $('date').value || isoToday());
    fd.append('client', $('client').value || '');
    fd.append('ticker', $('ticker').value || '');

    try {
      const res = await fetch('/api/generate-report', { method: 'POST', body: fd });
      if (!res.ok) {
        const txt = await res.text();
        throw new Error(txt || `HTTP ${res.status}`);
      }

      const blob = await res.blob();
      const url = URL.createObjectURL(blob);

      const ticker = ($('ticker').value || 'REPORT').trim().toUpperCase();
      const fname = `${ticker}_INVERNORD_report.pdf`;

      const a = document.createElement('a');
      a.href = url;
      a.download = fname;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);

      $('status').textContent = "Status: listo. PDF descargado.";
    } catch (err) {
      console.error(err);
      alert("Error generando el PDF. Abre Vercel → Logs para ver el detalle.\n\n" + err.message);
      $('status').textContent = "Status: error. Revisa Logs.";
    } finally {
      $('btn').disabled = false;
    }
  };
</script>
</body>
</html>
